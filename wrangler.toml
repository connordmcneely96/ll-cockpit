name = "ll-cockpit"
main = ".open-next/worker.js"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[[d1_databases]]
binding = "DB"
database_name = "ll-cockpit-db"
database_id = "831eeccf-60bc-4378-8a3b-71dfb910756e"

[[kv_namespaces]]
binding = "KV"
id = "db6866496e1f426e9d84758c9329ccfe"

[[r2_buckets]]
binding = "R2"
bucket_name = "ll-cockpit-r2"

[[vectorize]]
binding = "RESEARCH_INDEX"
index_name = "cockpit-research"

[[vectorize]]
binding = "MEMORY"
index_name = "cockpit-memory"

[[queues.producers]]
queue = "research-ingest"
binding = "RESEARCH_QUEUE"
